<div class="min-h-[calc(100vh-64px)] bg-base-200 flex items-center justify-center px-4 py-12">
  <div class="card bg-base-100 shadow-xl w-full max-w-md">
    <div class="card-body gap-5">

      <!-- Logo -->
      <div class="text-center">
        <div class="flex items-center justify-center gap-2">
          <img ngSrc="/assets/images/profile.jpg" width="48" height="48" alt="Marco Cobos" class="rounded-full object-cover" />
          <span class="text-3xl font-bold">Dev</span>
        </div>
        <h1 class="text-xl font-semibold mt-2">Iniciar sesión</h1>
        <p class="text-sm text-base-content/60">Accede a tu cuenta</p>
      </div>

      <!-- Error -->
      @if (errorMessage()) {
        <div class="alert alert-error" role="alert">
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span>{{ errorMessage() }}</span>
        </div>
      }

      <!-- Formulario -->
      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="flex flex-col gap-4">

          <div class="form-control">
            <label class="label" for="login-email">
              <span class="label-text font-medium">Correo electrónico</span>
            </label>
            <input
              id="login-email"
              type="email"
              formControlName="email"
              class="input input-bordered"
              [class.input-error]="form.get('email')?.invalid && form.get('email')?.touched"
              placeholder="tu@correo.com"
              autocomplete="email"
              aria-required="true"
            />
            @if (form.get('email')?.invalid && form.get('email')?.touched) {
              <label class="label">
                <span class="label-text-alt text-error" role="alert">Ingresa un correo válido</span>
              </label>
            }
          </div>

          <div class="form-control">
            <label class="label" for="login-password">
              <span class="label-text font-medium">Contraseña</span>
            </label>
            <input
              id="login-password"
              type="password"
              formControlName="password"
              class="input input-bordered"
              [class.input-error]="form.get('password')?.invalid && form.get('password')?.touched"
              placeholder="••••••••"
              autocomplete="current-password"
              aria-required="true"
            />
            @if (form.get('password')?.invalid && form.get('password')?.touched) {
              <label class="label">
                <span class="label-text-alt text-error" role="alert">Mínimo 6 caracteres</span>
              </label>
            }
          </div>

          <button
            type="submit"
            class="btn btn-primary w-full mt-1"
            [disabled]="form.invalid || submitting()"
          >
            @if (submitting()) {
              <span class="loading loading-spinner loading-sm" aria-hidden="true"></span>
            }
            Iniciar sesión
          </button>

        </div>
      </form>

      <!-- Google -->
      <button
        type="button"
        class="btn btn-outline w-full gap-2"
        aria-label="Iniciar sesión con Google"
        (click)="loginWithGoogle()"
      >
        <svg class="w-5 h-5" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continuar con Google
      </button>

      <p class="text-center text-sm text-base-content/60">
        ¿No tienes cuenta?
        <a routerLink="/registro" class="link link-primary font-medium">Regístrate</a>
      </p>

    </div>
  </div>
</div>
